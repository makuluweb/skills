<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bomber's Skills — Mastery Ladder</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='%23E8703A'%3E%3Crect x='3' y='14' width='4' height='7' rx='1'/%3E%3Crect x='10' y='9' width='4' height='12' rx='1'/%3E%3Crect x='17' y='4' width='4' height='17' rx='1'/%3E%3C/g%3E%3C/svg%3E">
<meta name="theme-color" content="#121714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bomber's Skills">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#121714;--ink-2:#1A211C;--ink-3:#232C26;--ink-4:#2B362E;
    --line:#2E3A31;--line-2:#3A483D;
    --chalk:#F1EEE3;--muted:#97A296;--muted-2:#6F7B71;
    --ember:#E8703A;--ember-dim:rgba(232,112,58,.14);--ember-line:rgba(232,112,58,.4);
    --sage:#86B08C;--sage-dim:rgba(134,176,140,.16);--amber:#E3B24C;
    --steel:#6E9BC9;--violet:#B08AD0;--teal:#5FB0A8;
    --disp:"Space Grotesk",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--chalk);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.45}
  body{padding-bottom:44px}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,textarea{font-family:inherit;color:inherit}
  ::selection{background:var(--ember);color:var(--ink)}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--ink),rgba(18,23,20,.92));backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar{max-width:780px;margin:0 auto;padding:15px 18px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:26px;height:26px;color:var(--ember);flex:0 0 auto}
  .logo svg{width:26px;height:26px}
  .title{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.08em;text-transform:uppercase}
  .title .sub{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:var(--muted);font-weight:500;margin-top:2px}
  .back{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;padding:0;display:inline-flex;align-items:center;gap:5px}
  .back:hover{color:var(--chalk)}
  nav{max-width:780px;margin:0 auto;padding:0 12px;display:flex;gap:2px}
  .tab{background:none;border:none;padding:9px 14px 11px;font-size:13px;font-weight:600;color:var(--muted-2);border-bottom:2px solid transparent}
  .tab.active{color:var(--chalk);border-bottom-color:var(--ember)}
  .tab:hover{color:var(--chalk)}

  main{max-width:780px;margin:0 auto;padding:20px 18px}
  .view{display:none;animation:fade .22s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.view{animation:none}}

  h2{font-family:var(--disp);font-weight:600;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ember)}
  .muted{color:var(--muted)}.small{font-size:13px}.tiny{font-size:11.5px}

  /* dashboard skill cards */
  .skillcard{background:var(--ink-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:border-color .15s}
  .skillcard:hover{border-color:var(--ember-line)}
  .ring{flex:0 0 auto;position:relative;width:54px;height:54px}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:13px}
  .sc-meta{flex:1;min-width:0}
  .sc-name{font-family:var(--disp);font-weight:600;font-size:16px}
  .sc-cur{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc-cur b{color:var(--ember);font-weight:600}
  .sc-count{font-family:var(--mono);font-size:11px;color:var(--muted-2);margin-top:4px}
  .chev{color:var(--muted-2);font-size:20px;flex:0 0 auto}

  .overall{background:var(--ink-3);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
  .overall .n{font-family:var(--mono);font-weight:700;font-size:26px;color:var(--ember)}
  .overall .n span{font-size:15px;color:var(--muted)}

  /* skill detail */
  .det-head{margin-bottom:14px}
  .det-name{font-family:var(--disp);font-weight:700;font-size:23px;margin:8px 0 4px}
  .det-prereq{font-size:12.5px;color:var(--muted);background:var(--ink-2);border:1px solid var(--line);border-left:2px solid var(--ember);border-radius:8px;padding:9px 12px;margin-top:10px}
  .pbar{height:7px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:12px}
  .pbar .fill{height:100%;background:var(--ember);border-radius:4px;transition:width .3s}

  .step{border:1px solid var(--line);border-radius:13px;margin-bottom:11px;overflow:hidden;background:var(--ink-2)}
  .step.done{border-color:rgba(134,176,140,.4)}
  .step.current{border-color:var(--ember-line)}
  .step-head{display:flex;align-items:flex-start;gap:12px;padding:14px;cursor:pointer}
  .dot{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted-2);margin-top:1px}
  .step.done .dot{background:var(--sage);border-color:var(--sage);color:var(--ink)}
  .step.current .dot{border-color:var(--ember);color:var(--ember)}
  .step-main{flex:1;min-width:0}
  .step-name{font-weight:600;font-size:15px}
  .step.done .step-name{color:var(--muted)}
  .step-crit{font-size:12.5px;color:var(--muted);margin-top:3px}
  .step-crit b{color:var(--chalk);font-weight:600}
  .step-date{font-family:var(--mono);font-size:11px;color:var(--sage);margin-top:5px}
  .step-toggle{color:var(--muted-2);font-size:13px;flex:0 0 auto;margin-top:2px}
  .step-body{display:none;padding:0 14px 14px 52px}
  .step.open .step-body{display:block}
  .opt{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-top:1px solid var(--line)}
  .tag{flex:0 0 auto;font-family:var(--mono);font-size:9px;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:5px;font-weight:700;margin-top:1px;min-width:62px;text-align:center}
  .opt .ot{font-size:13px;flex:1}
  .step-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;align-items:center}
  .note-in{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;margin-top:10px;outline:none}
  .note-in:focus{border-color:var(--ember-line)}

  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--ink-4);border:1px solid var(--line-2);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--muted-2)}
  .btn.primary{background:var(--ember);border-color:var(--ember);color:#1A0E07}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.done{background:var(--sage-dim);border-color:rgba(134,176,140,.5);color:var(--sage)}
  .btn.ghost{background:none}.btn.sm{padding:7px 11px;font-size:12.5px}
  .btn.danger:hover{border-color:#C9543E;color:#E8917F}

  .coachbox{margin-top:14px;background:var(--ink-3);border:1px solid var(--line);border-radius:12px;padding:13px}
  .coachbox .out{font-size:13.5px;line-height:1.55;margin-top:10px;white-space:pre-wrap;color:var(--chalk)}

  /* timeline */
  .tl{position:relative;padding-left:22px}
  .tl::before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tlitem{position:relative;padding:0 0 16px}
  .tlitem::before{content:"";position:absolute;left:-19px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--sage);border:2px solid var(--ink)}
  .tl-date{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .tl-skill{font-size:11px;color:var(--ember);font-weight:600}
  .tl-name{font-weight:600;font-size:14px;margin-top:2px}

  .empty{text-align:center;padding:34px 18px;border:1px dashed var(--line-2);border-radius:13px;color:var(--muted)}
  .empty h3{color:var(--chalk);margin-bottom:6px}

  label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
  input[type=text],input[type=password]{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:14px;outline:none}
  input:focus{border-color:var(--ember-line)}
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:12px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink-4);border:1px solid var(--line-2);border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:80}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  a{color:var(--ember)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="14" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="12" rx="1"/><rect x="17" y="4" width="4" height="17" rx="1"/></svg></span>
      <div class="grow"><div class="title">Bomber's Skills<span class="sub">Mastery Ladder</span></div></div>
    </div>
  </div>
  <nav id="nav"></nav>
</header>

<main>
  <section class="view active" id="view-skills"></section>
  <section class="view" id="view-detail"></section>
  <section class="view" id="view-log"></section>
  <section class="view" id="view-settings"></section>
</main>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------- storage ---------- */
const mem={};
const store={ok:true,
  get(k){try{const v=localStorage.getItem(k);return v==null?(k in mem?mem[k]:null):v;}catch(e){this.ok=false;return k in mem?mem[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){this.ok=false;}mem[k]=v;}};
const KEY="bombers.skills.v1";

/* ---------- tags ---------- */
const TAGS={
  S:{l:"Strength",c:"var(--ember)",b:"var(--ember-dim)"},
  K:{l:"Skill",c:"var(--steel)",b:"rgba(110,155,201,.15)"},
  B:{l:"Band",c:"var(--amber)",b:"rgba(227,178,76,.14)"},
  M:{l:"Mobility",c:"var(--sage)",b:"var(--sage-dim)"},
  E:{l:"Eccentric",c:"var(--violet)",b:"rgba(176,138,208,.15)"},
  C:{l:"Core",c:"var(--teal)",b:"rgba(95,176,168,.15)"},
  A:{l:"Active",c:"var(--sage)",b:"var(--sage-dim)"},
  G:{l:"Grip",c:"var(--amber)",b:"rgba(227,178,76,.14)"},
  V:{l:"Volume",c:"var(--steel)",b:"rgba(110,155,201,.15)"},
  T:{l:"Tip",c:"var(--muted)",b:"rgba(151,162,150,.12)"}
};

/* ---------- skill data (research-backed) ---------- */
const SKILLS=[
{id:"hspu",name:"Handstand Push-Up",prereq:"Base: comfortable inverted on a wall, ~180° pain-free shoulder flexion, solid pike push-ups. Train 2× / week, skill work fresh & short of failure, protect the neck.",steps:[
  {n:"Pike push-up (feet on floor)",c:"3 × 8 strict, forearms vertical, no flare",o:[["S","Pike push-up 3×8, head to a point just past fingertips"],["S","Seated DB Z-press 3×8 (vertical press strength)"],["P","3s-eccentric pike push-ups 5×3"],["M","Wall scapular slides + shoulder flexion to 180°"],["K","Bottom-position pike hold 5×5s"]]},
  {n:"Feet-elevated pike push-up",c:"3 × 8 with hips stacked over hands",o:[["S","Feet on bench/box pike push-up 3×8 (~77% of HSPU load)"],["S","Heavy seated DB press, slow negatives"],["E","Elevated pike negatives 5×3 @ 4s"],["K","Forehead-to-floor 'tripod' target, elbows tucked"],["M","Wrist + thoracic prep"]]},
  {n:"Wall handstand hold (chest-to-wall)",c:"60s solid, hollow, ribs down",o:[["K","Chest-to-wall hold, build to 60s"],["K","Back-to-wall hold for alignment"],["K","Wall weight-shift taps (balance)"],["M","Shoulder openers / wrist load"],["S","Pike press-position hold"]]},
  {n:"Wall HSPU negatives",c:"5 × 3 controlled 3–4s lowers to abmat",o:[["E","HSPU negatives to abmat, slow & controlled"],["B","Band-assisted HSPU (band looped from rig under hips)"],["R","Plates + abmat to set a reduced range"],["S","Elevated pike heavy 3×5"],["K","Consistent kick-up to the wall"]]},
  {n:"Reduced-ROM wall HSPU",c:"8 strict with one abmat/plate",o:[["R","Remove one plate/pad over time toward floor"],["B","Band-assist, drop band thickness each block"],["P","Tempo HSPU, pause at bottom"],["K","Head-to-tripod, 'close the jar' elbow cue"],["S","DB push-press for lockout power"]]},
  {n:"Full-ROM strict wall HSPU",c:"5 strict, head to floor, no kip",o:[["V","Build sets 3×5, stop a rep shy of failure"],["E","Pause 1s at the bottom each rep"],["V","Grease-the-groove: frequent low-rep singles"],["B","Wean off any remaining band"],["K","Begin freestanding negatives"]]},
  {n:"Deficit / freestanding HSPU",c:"3 deficit on parallettes OR 1 freestanding",o:[["S","Parallette deficit HSPU 3×3 (extra ROM)"],["K","Freestanding: wall-taps, then step away"],["E","Freebalancing HSPU negatives"],["S","Weighted (vest) wall HSPU"],["K","Freestanding handstand hold 30s"]]}
]},
{id:"bmu",name:"Bar Muscle-Up",prereq:"Base before starting: ~10–12 strict pull-ups (chest-to-bar better) and 8–10 controlled bar dips, plus 10–15 toes-to-bar for midline. 2–3 focused sessions / week.",steps:[
  {n:"Chest/sternum-to-bar pull",c:"5 strict pulls to the sternum, hollow",o:[["S","Weighted chest-to-bar pull-ups 3×3"],["K","High pull — pull as LOW as possible (bar toward navel)"],["S","Straight-arm lat pulldown with band/PVC"],["C","Hollow-body holds 3×30s"],["K","Scap pull-ups, active shoulders under bar"]]},
  {n:"Straight-arm / arch→hollow drill",c:"Control arch→hollow pulldown 3×8 (PVC+band)",o:[["B","PVC + band straight-arm pulldown, hold tension 3-2-1"],["K","Arch→hollow kip swing on the bar"],["K","Box drill: arch-hollow with hands rotating over bar"],["S","Straight-arm lat strength work"],["C","Toes-to-bar 10–15, minimal swing"]]},
  {n:"Transition pattern (bar-to-belly)",c:"5 controlled chest-over-bar transitions",o:[["K","Low-bar muscle-up: roll chest over slowly from the ground"],["S","Russian push-up — fast pull→press, full tension"],["K","Box drop-in: bar-at-hips to chest-over, no kip"],["K","Jumping bar MU off a box (lower over time)"],["S","Straight-bar dips 8–10 for the press-out"]]},
  {n:"Band-assisted strict bar MU",c:"4 × 2–3, dropping band resistance each session",o:[["B","Band under feet, strict MU — heavy band → thin band"],["E","Slow strict MU negatives"],["B","Seated banded pull-to-press (transition path)"],["S","High-pull + bar dip combo"],["V","EMOM of 1 strict-ish rep"]]},
  {n:"Kipping / jumping bar MU (bridge)",c:"5 consistent kipping singles",o:[["K","Box jumping MU, lower the box gradually"],["K","Hip-pop + knee-tuck timing drill (on back)"],["K","Hand-release kips — confirm peak position"],["K","Hollow/arch kip swing rhythm"],["V","Weekly EMOM of 1 MU, go on the minute"]]},
  {n:"Strict bar muscle-up",c:"1 strict from dead hang, no kip",o:[["S","Weighted chest-to-bar 3×3"],["E","Strict MU negatives, control the turnover"],["K","Singles from dead hang, full rest"],["S","Weighted straight-bar dips"],["G","Slight overgrip / wrist flexion for easier turnover"]]},
  {n:"Multiple / linked bar MU",c:"3 strict OR 5 touch-and-go",o:[["V","Strict sets 3×2"],["K","Touch-and-go linking, 2 reps then build"],["X","EMOM muscle-ups for capacity"],["S","Heavy weighted pull + dip"],["K","Consistent kip cycling without form drop"]]}
]},
{id:"rmu",name:"Strict Ring Muscle-Up",prereq:"Base: mastered false grip, ~5 strict ring/false-grip pull-ups, solid ring support + ring dips, 2-min dead hang grip. Strict before kipping — rings are unforgiving.",steps:[
  {n:"False-grip hang & ring rows",c:"20–30s false-grip hang; 5 false-grip ring rows",o:[["G","False-grip dead hang, build time (wrist crook over ring)"],["G","Lacrosse-ball squeeze hangs for grip"],["S","False-grip ring rows to sternum"],["K","Set the wrist deep, knuckles in"],["M","Wrist + biceps tendon prep"]]},
  {n:"False-grip ring pull to sternum",c:"5 strict false-grip pulls low to the chest",o:[["S","False-grip ring pull-ups, elbows tight"],["K","Pull rings to sternum / as low as possible"],["S","Weighted chin pulls on the bar (carry-over)"],["E","Slow lowers from top of pull"],["K","Top-of-pull hold 5s"]]},
  {n:"Support & bottom-of-dip holds",c:"RTO support 20–30s + bottom-of-dip hold 10s",o:[["S","Rings-turned-out (RTO) support hold"],["S","Bottom-of-ring-dip hold 10s"],["S","Ring dips 5–8 controlled"],["K","Build toward turning the rings out"],["M","Shoulder-extension / dip stretch"]]},
  {n:"Transition drills (kneeling / toe)",c:"5 controlled kneeling or toe-assisted transitions",o:[["K","Kneeling transition, rings directly overhead"],["K","Toe-assisted transition, keep ring tension"],["K","Box transition: stand, lower to full extension"],["K","'Fast elbows' — pull → press, ride the elevator"],["C","Sit-up / nose-through-the-rings drill"]]},
  {n:"Band / seated-band assisted MU",c:"5 banded strict MUs, reducing assistance",o:[["B","Seated floor-band MU (rings over rig, sit, pull-press)"],["B","Basket-drill band transition over the top"],["E","Negative MU: toe-assisted → no feet"],["K","Jumping low-ring MU for the pattern"],["S","Combine full pull + deep dip"]]},
  {n:"Strict ring muscle-up",c:"1 strict, controlled, no kip",o:[["K","Strict singles, full rest between"],["E","Strict negatives, resist the turnover"],["S","False-grip weighted pulls"],["K","Film front-on — catch a crooked/weak-side pull"],["S","Deep ring dips for the press-out"]]},
  {n:"Multiple strict ring MU",c:"3 strict in a set",o:[["V","Strict 3×2"],["K","Link rep → ring dip"],["S","Weighted ring pull + dip"],["X","EMOM ring MU"],["K","L-sit ring MU (advance)"]]}
]},
{id:"fl",name:"Front Lever Hold",prereq:"Base: strong scapular control, can hold an inverted hang, ideally building weighted pull-ups (full FL correlates with ~60–85% BW weighted pull). Straight arms, no low-back arch.",steps:[
  {n:"Tuck front lever",c:"15–20s, scapula depressed, arms straight",o:[["S","Tuck FL hold 5×10–15s"],["K","Inverted hang + scap retract/depress"],["S","Front-lever tuck raises"],["B","Band-assisted tuck (band at hips, not feet)"],["C","Hollow-body holds for the bodyline"]]},
  {n:"Advanced tuck front lever (flat back)",c:"15–20s, flat back, hips level with shoulders",o:[["S","Advanced-tuck hold 5×10s"],["K","One-leg advanced tuck (alternate sides)"],["E","Negatives from inverted to adv-tuck"],["B","Band-at-hips advanced tuck"],["S","Weighted pull-ups, build toward 60% BW"]]},
  {n:"One-leg front lever",c:"10–15s each leg, body parallel",o:[["S","One-leg holds, alternate the extended leg"],["K","Bicycle / flutter front lever"],["E","One-leg negatives"],["B","Band-assisted one-leg"],["S","Dragon flag (single-leg tuck) for midline"]]},
  {n:"Straddle front lever",c:"10–15s, flat, legs in a wide V",o:[["S","Straddle hold 5×8–10s"],["B","Band-assist straddle, lighten the band over weeks"],["E","Straddle negatives"],["K","Closed-hip → open-hip progression"],["S","Straddle front-lever rows"]]},
  {n:"Half-lay / one-leg straddle",c:"8–12s, hips opening toward full",o:[["S","Half-lay hold"],["K","Open-hip awareness, push the back out"],["E","Negatives from inverted"],["B","Band-assist weaning"],["S","Weighted pulls 70–85% BW"]]},
  {n:"Full front lever",c:"5–10s, body horizontal, arms locked, toes pointed",o:[["S","Full FL holds, accumulate time"],["E","Full negatives 3–5 slow reps"],["K","FL raises: tuck → full"],["B","Band-assist, wean toward none"],["S","Front-lever rows"]]},
  {n:"Front lever — advanced",c:"10s+ full hold OR 5 FL pull-ups",o:[["S","Front-lever pull-ups"],["K","FL → inverted raises"],["V","Accumulate total hold time"],["S","Weighted full FL (ankle weights)"],["K","Touch-and-go FL reps"]]}
]},
{id:"planche",name:"Planche Hold",prereq:"Base: 30s handstand, healthy shoulders, 2+ months wrist conditioning first. Locked elbows + protracted (rounded) scapula throughout. Train 3–4× / week max — straight-arm work is brutal on the elbows/biceps.",steps:[
  {n:"Planche lean (extreme)",c:"20–30s, shoulders well past wrists, hollow & protracted",o:[["S","Planche-lean hold 5×20s, scapula protracted"],["S","Pseudo-planche push-ups"],["K","Scapular protraction band drill (serratus)"],["M","Dedicated wrist prep / loading"],["S","Frog stand → tuck prep"]]},
  {n:"Tuck planche",c:"15–20s, knees tucked, hips above shoulders",o:[["S","Tuck-planche hold 5×10–15s (accumulate ~2 min total)"],["S","Weighted tuck planche"],["K","Tuck planche on parallettes (kinder on wrists)"],["K","Frog → tuck transition"],["S","Pseudo-planche push-ups"]]},

  {n:"Full planche",c:"3–5s, legs together, body parallel",o:[["B","Band-assist full planche, wean"],["E","Full-planche negatives"],["K","Tuck → straddle → full transitions"],["S","Maltese-lean / heavy straight-arm"],["V","Time accumulation"]]}
]},
{id:"splits",name:"Splits (Front + Middle)",prereq:"Always warm up first — never stretch cold. Measure progress only AFTER warming up. Combine passive holds with ACTIVE end-range strength + contract-relax (PNF). Stretch 2–3× / week (or short daily), with rest days.",steps:[
  {n:"Foundation mobility",c:"Sit comfortably in low lunge & seated pike; log a baseline split height",o:[["M","Low-lunge hip-flexor stretch 30–60s/side"],["M","Seated pike / hamstring stretch"],["A","Controlled leg raises & leg swings"],["M","Pancake (wide seated) sit"],["T","Warm up with cardio first; close the windows, get hot"]]},
  {n:"Half / front-split prep",c:"Front split ~6 inches off the floor, hips square",o:[["M","Kneeling / couch hip-flexor stretch"],["M","Half-split hamstring reach, flat back"],["A","Active hovering split lifts (strength at end range)"],["M","PNF hamstring contract-relax"],["T","Blocks under the hands, hips square (don't sit on the front hip)"]]},
  {n:"Front split — each side",c:"Flat front split, both sides, square hips",o:[["M","Supported front split on blocks, lower over weeks"],["M","PNF contract-relax in the split"],["A","Active split lift-offs"],["M","Back-leg quad / calf stretch"],["T","Re-measure only after a full warm-up"]]},
  {n:"Middle / straddle prep",c:"Wide seated straddle chest toward floor; standing straddle hands to floor",o:[["M","Seated straddle / pancake lean"],["M","Frog pose"],["A","Straddle good-mornings (active)"],["M","Adductor PNF contract-relax"],["T","Keep toes & knees pointing up"]]},
  {n:"Middle split",c:"Flat-ish middle split, neutral pelvis",o:[["M","Wall straddle (legs up wall, widen)"],["M","Frog pose, add gentle load (advanced)"],["A","Cossack squats"],["E","Standing straddle slide-out on sliders (controlled)"],["T","Keep the pelvis neutral, don't roll back"]]},
  {n:"Active flexibility / oversplit",c:"Hold splits with control; active leg lift, or slight oversplit on a block",o:[["A","Active split lift-offs (no hands)"],["S","Jefferson curl / loaded hamstring strength"],["M","Slight oversplit on a block (careful)"],["A","Kick-height drills"],["T","Maintain 2–3×/week to keep it"]]}
]},
{id:"press",name:"Press to Handstand (from floor sit)",prereq:"Base: a solid 30–60s handstand, good pike & pancake compression, a straddle/L-sit. The press is a mix of compression strength + straight-arm shoulder lean + balance — straddle is easier than pike to start.",steps:[
  {n:"Compression & straddle-L foundation",c:"Straddle-L: lift feet off floor & hold 5s; seated straddle pulse",o:[["S","Straddle-L hold 3×, build time"],["S","Seated leg lifts / compression pulses"],["M","Pancake & pike compression (active)"],["S","Stalder leg lifts (hanging or floor)"],["K","Furniture-slider compression drag-ins"]]},
  {n:"Press walk / weight shift",c:"Walk feet in until weightless, hands planted",o:[["K","Press walks — lean until the feet float"],["S","Tuck-ups in a wall handstand (tuck in & out)"],["S","Tuck-planche prep (straight-arm lean)"],["K","Toe-touch press attempts"],["M","Shoulder flexion / open-shoulder work"]]},
  {n:"Wall straddle-press negatives",c:"5 × 3 controlled lowers from handstand to straddle below 90°",o:[["E","Wall straddle negatives — lower slow, shrug hard"],["K","Roll the hips down first, vertebra by vertebra"],["E","Elevated straddle-press negative"],["K","Headstand straddle leg-lift (easier, stable)"],["C","Hollow compression holds"]]},
  {n:"Elevated / assisted straddle press",c:"Press up from feet elevated on a box/blocks",o:[["K","Feet-elevated straddle press"],["B","Partner- or band-assisted lift-off (slow the float)"],["K","Jumping straddle press, minimise the jump"],["K","Lower the block height over time"],["S","Straddle-press hip-lift drill"]]},
  {n:"Straddle press to handstand",c:"1 straddle press from the floor, controlled",o:[["K","Straddle press: legs slightly wider than hands, circle up"],["E","Keep training negatives alongside"],["S","Compression + forward shoulder lean (hips lead, not traps)"],["K","Hunt the 'lift-off float' moment"],["V","Practise singles when fresh"]]},
  {n:"Pike press / multiple presses",c:"3 straddle presses OR 1 pike press",o:[["K","Pike press (more lean, harder)"],["S","Tuck-planche press"],["V","Press reps 3×3"],["K","Manna / stalder prep (advance)"],["S","Weighted compression work"]]}
]}
];

/* ---------- state ---------- */
let S=load();
function defaults(){return {apiKey:"",model:"claude-sonnet-4-6",progress:{}};}
function load(){try{const r=store.get(KEY);if(!r)return defaults();return Object.assign(defaults(),JSON.parse(r));}catch(e){return defaults();}}
function save(){store.set(KEY,JSON.stringify(S));}
function prog(id){return S.progress[id]||(S.progress[id]={});}
function stepState(id,i){return prog(id)[i]||null;}
function doneCount(id){const p=prog(id);return SKILLS.find(s=>s.id===id).steps.filter((_,i)=>p[i]&&p[i].done).length;}
function currentStep(id){const sk=SKILLS.find(s=>s.id===id);for(let i=0;i<sk.steps.length;i++){const st=stepState(id,i);if(!st||!st.done)return i;}return sk.steps.length-1;}

/* ---------- helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=iso=>new Date(iso+"T00:00:00").toLocaleDateString(undefined,{day:"numeric",month:"short",year:"numeric"});
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}
function cleanSkill(n){return n.replace(/\s*\(.*?\)/g,"").replace(/\bHold\b/,"").trim();}

/* ---------- nav ---------- */
let activeSkill=null;
const TABS=[["skills","Skills"],["log","Timeline"],["settings","Settings"]];
function buildNav(){const nav=$("#nav");nav.innerHTML="";TABS.forEach(([id,l])=>{const b=el("button","tab"+(id==="skills"?" active":""),l);b.dataset.tab=id;b.onclick=()=>go(id);nav.appendChild(b);});}
function go(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===id||(id==="detail"&&t.dataset.tab==="skills")));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id==="view-"+id));
  ({skills:renderSkills,detail:renderDetail,log:renderLog,settings:renderSettings}[id])();
  window.scrollTo(0,0);
}

/* ---------- progress ring ---------- */
function ring(done,total){
  const r=24,circ=2*Math.PI*r,pct=total?done/total:0;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 54 54");svg.setAttribute("width","54");svg.setAttribute("height","54");
  const bg=document.createElementNS(svg.namespaceURI,"circle");
  bg.setAttribute("cx","27");bg.setAttribute("cy","27");bg.setAttribute("r",r);bg.setAttribute("fill","none");bg.setAttribute("stroke","var(--line)");bg.setAttribute("stroke-width","4");
  const fg=document.createElementNS(svg.namespaceURI,"circle");
  fg.setAttribute("cx","27");fg.setAttribute("cy","27");fg.setAttribute("r",r);fg.setAttribute("fill","none");
  fg.setAttribute("stroke",pct===1?"var(--sage)":"var(--ember)");fg.setAttribute("stroke-width","4");fg.setAttribute("stroke-linecap","round");
  fg.setAttribute("stroke-dasharray",circ);fg.setAttribute("stroke-dashoffset",circ*(1-pct));
  fg.setAttribute("transform","rotate(-90 27 27)");
  svg.append(bg,fg);return svg;
}

/* ---------- SKILLS dashboard ---------- */
function renderSkills(){
  const v=$("#view-skills");v.innerHTML="";
  const totalSteps=SKILLS.reduce((a,s)=>a+s.steps.length,0);
  const totalDone=SKILLS.reduce((a,s)=>a+doneCount(s.id),0);
  const ov=el("div","overall");
  ov.innerHTML=`<div><div class="eyebrow">Progressions nailed</div><div class="tiny muted" style="margin-top:4px">across all 7 skills</div></div><div class="n">${totalDone}<span>/${totalSteps}</span></div>`;
  v.appendChild(ov);

  SKILLS.forEach(sk=>{
    const dc=doneCount(sk.id),tc=sk.steps.length,cur=currentStep(sk.id),complete=dc===tc;
    const c=el("div","skillcard");
    const rg=el("div","ring");rg.appendChild(ring(dc,tc));
    rg.appendChild(el("div","pct",complete?'<span style="color:var(--sage)">✓</span>':Math.round(dc/tc*100)+"%"));
    const meta=el("div","sc-meta");
    meta.innerHTML=`<div class="sc-name">${esc(sk.name)}</div>
      <div class="sc-cur">${complete?'<b style="color:var(--sage)">Mastered</b>':'Next: <b>'+esc(sk.steps[cur].n)+'</b>'}</div>
      <div class="sc-count">${dc} / ${tc} rungs</div>`;
    c.append(rg,meta,el("div","chev","›"));
    c.onclick=()=>{activeSkill=sk.id;go("detail");};
    v.appendChild(c);
  });
}

/* ---------- SKILL detail ---------- */
function renderDetail(){
  const v=$("#view-detail");v.innerHTML="";
  const sk=SKILLS.find(s=>s.id===activeSkill);if(!sk){go("skills");return;}
  const dc=doneCount(sk.id),tc=sk.steps.length,cur=currentStep(sk.id);

  const back=el("button","back","‹ All skills");back.onclick=()=>go("skills");v.appendChild(back);
  const head=el("div","det-head");
  head.innerHTML=`<div class="eyebrow" style="margin-top:10px">${dc===tc?"Mastered":"Rung "+(cur+1)+" of "+tc}</div>
    <div class="det-name">${esc(sk.name)}</div>
    <div class="pbar"><div class="fill" style="width:${Math.round(dc/tc*100)}%;${dc===tc?'background:var(--sage)':''}"></div></div>
    <div class="det-prereq">${esc(sk.prereq)}</div>`;
  v.appendChild(head);

  sk.steps.forEach((st,i)=>{
    const ss=stepState(sk.id,i);const done=ss&&ss.done;const isCur=!done&&i===cur;
    const box=el("div","step"+(done?" done":"")+(isCur?" current":"")+(isCur?" open":""));
    const h=el("div","step-head");
    h.innerHTML=`<div class="dot">${done?"✓":(i+1)}</div>
      <div class="step-main"><div class="step-name">${esc(st.n)}</div>
      <div class="step-crit"><b>Pass:</b> ${esc(st.c)}</div>
      ${done&&ss.date?`<div class="step-date">✓ achieved ${fmtDate(ss.date)}</div>`:""}</div>
      <div class="step-toggle">▾</div>`;
    const body=el("div","step-body");
    st.o.forEach(([code,txt])=>{const tg=TAGS[code]||TAGS.T;const row=el("div","opt");
      row.innerHTML=`<span class="tag" style="color:${tg.c};background:${tg.b}">${tg.l}</span><span class="ot">${esc(txt)}</span>`;
      body.appendChild(row);});
    // actions
    const act=el("div","step-actions");
    const achBtn=el("button","btn "+(done?"done":"primary")+" sm",done?"✓ Achieved — undo":"Mark achieved");
    achBtn.onclick=(e)=>{e.stopPropagation();const p=prog(sk.id);
      if(done){if(confirm("Remove this achievement?")){p[i]={done:false,date:null,note:p[i]?p[i].note:""};save();renderDetail();}}
      else{p[i]=Object.assign(p[i]||{},{done:true,date:todayISO()});save();toast("Logged ✓ "+st.n);renderDetail();}};
    act.appendChild(achBtn);
    const demo=el("button","btn ghost sm","▶ Watch demo");
    demo.onclick=(e)=>{e.stopPropagation();const q=encodeURIComponent(cleanSkill(sk.name)+" "+st.n+" tutorial");window.open("https://www.youtube.com/results?search_query="+q,"_blank","noopener");};
    act.appendChild(demo);
    if(S.apiKey){const cb=el("button","btn ghost sm","✦ Coach tip");cb.onclick=(e)=>{e.stopPropagation();coachTip(sk,st,body,cb);};act.appendChild(cb);}
    body.appendChild(act);
    // note
    const note=el("input","note-in");note.type="text";note.placeholder="Your note (load, hold time, sticking point)…";note.value=(ss&&ss.note)||"";
    note.onclick=e=>e.stopPropagation();
    note.onchange=()=>{const p=prog(sk.id);p[i]=Object.assign(p[i]||{done:false,date:null},{note:note.value});save();};
    body.appendChild(note);

    h.onclick=()=>box.classList.toggle("open");
    box.append(h,body);v.appendChild(box);
  });
}
async function coachTip(sk,st,body,btn){
  btn.textContent="✦ …";btn.disabled=true;
  let out=body.querySelector(".coachbox");
  if(!out){out=el("div","coachbox");out.innerHTML='<div class="eyebrow">Coach tip</div><div class="out"></div>';body.appendChild(out);}
  const sys="You are a concise expert gymnastics/calisthenics coach. The athlete is an advanced trainee working a specific progression. Give 3-4 short, practical, specific cues or programming tips for THIS rung only — sets/holds, common form faults, and how to know they're ready to advance. Plain text, no preamble.";
  const u="Skill: "+sk.name+"\nCurrent rung: "+st.n+"\nPass criterion: "+st.c+"\nTraining options available: "+st.o.map(o=>TAGS[o[0]].l+": "+o[1]).join("; ");
  try{const t=await callAI([{role:"user",content:u}],sys,500);out.querySelector(".out").textContent=t;}
  catch(e){out.querySelector(".out").textContent="⚠ "+e.message;}
  btn.textContent="✦ Coach tip";btn.disabled=false;
}
async function callAI(messages,system,maxTokens){
  if(!S.apiKey)throw new Error("No API key (Settings).");
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"content-type":"application/json","x-api-key":S.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:S.model,max_tokens:maxTokens||500,system,messages})});
  if(!res.ok){let m="API error "+res.status;try{const j=await res.json();if(j.error&&j.error.message)m=j.error.message;}catch(e){}throw new Error(m);}
  const d=await res.json();return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim()||"(empty)";
}

/* ---------- TIMELINE ---------- */
function renderLog(){
  const v=$("#view-log");v.innerHTML="";
  v.appendChild(el("div","row",`<h2 style="margin:0">Achievement timeline</h2>`));
  const items=[];
  SKILLS.forEach(sk=>sk.steps.forEach((st,i)=>{const ss=stepState(sk.id,i);if(ss&&ss.done&&ss.date)items.push({date:ss.date,skill:sk.name,name:st.n});}));
  if(!items.length){v.appendChild(el("div","empty",`<h3>No rungs logged yet</h3><p class="small">Open a skill, work a rung, and tap <b>Mark achieved</b> — it'll stamp the date and appear here.</p>`));return;}
  items.sort((a,b)=>b.date.localeCompare(a.date));
  const tl=el("div","tl");
  items.forEach(it=>{const d=el("div","tlitem");d.innerHTML=`<div class="tl-date">${fmtDate(it.date)}</div><div class="tl-skill">${esc(it.skill)}</div><div class="tl-name">${esc(it.name)}</div>`;tl.appendChild(d);});
  v.appendChild(tl);
}

/* ---------- SETTINGS ---------- */
function renderSettings(){
  const v=$("#view-settings");v.innerHTML="";
  v.appendChild(el("div","row",`<h2 style="margin:0">Settings</h2>`));
  if(!store.ok){v.appendChild(el("div","card",`<span class="tiny" style="color:var(--amber)">Storage is blocked in this preview — <b>download the file and open it from your own device</b> so your progress saves.</span>`));}

  const ai=el("div","card");
  ai.innerHTML=`<div class="eyebrow">AI coach tips (optional)</div><div class="tiny muted" style="margin:6px 0 12px">Add an Anthropic key to get a "Coach tip" button on each rung. Stored only on this device. <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">Get a key →</a></div>`;
  const kl=el("label","fld","Anthropic API key");const kin=el("input");kin.type="password";kin.placeholder="sk-ant-…";kin.value=S.apiKey;
  const sb=el("button","btn primary sm","Save key");sb.style.marginTop="12px";
  sb.onclick=()=>{S.apiKey=kin.value.trim();save();toast("Saved ✓");renderSettings();};
  ai.append(kl,kin,sb);v.appendChild(ai);

  const data=el("div","card");
  data.innerHTML=`<div class="eyebrow">Your data</div><div class="tiny muted" style="margin:6px 0 12px">Progress and dates live on this device.</div>`;
  const exp=el("button","btn ghost sm","↓ Export backup");
  exp.onclick=()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});const a=el("a");a.href=URL.createObjectURL(b);a.download="bombers-skills-"+todayISO()+".json";a.click();};
  const impL=el("label","btn ghost sm","↑ Import backup");impL.style.marginLeft="8px";
  const imp=el("input");imp.type="file";imp.accept=".json,application/json";imp.style.display="none";
  imp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{S=Object.assign(defaults(),JSON.parse(r.result));save();toast("Imported ✓");go("skills");}catch(err){toast("Invalid file");}};r.readAsText(f);};
  impL.appendChild(imp);
  const wipe=el("button","btn ghost sm danger","Reset progress");wipe.style.marginLeft="8px";
  wipe.onclick=()=>{if(confirm("Erase all progress, dates and notes on this device?")){S=defaults();save();go("skills");}};
  data.append(exp,impL,wipe);v.appendChild(data);

  v.appendChild(el("div","tiny muted",`Bomber's Skills — progressions researched from GMB, WODprep, Performance Plus, Berg Movement, Calisthenics Association & others. Train skills fresh, short of failure, and protect your joints. Not medical advice.`));
}

/* ---------- boot ---------- */
buildNav();renderSkills();
</script>
